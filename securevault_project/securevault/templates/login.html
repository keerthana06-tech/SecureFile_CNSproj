<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecureVault — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
      <h1>SecureVault</h1>
      <p class="tagline">Advanced File Integrity & Secure Storage</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">
          <i class="fas {% if cat=='success' %}fa-circle-check{% elif cat=='error' %}fa-circle-xmark{% else %}fa-circle-info{% endif %}"></i>
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="field-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="field-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="pw-wrapper">
          <input type="password" name="password" id="pw" placeholder="Enter password" required autocomplete="current-password"/>
          <button type="button" class="pw-toggle" onclick="togglePw('pw','eyePw')">
            <i class="fas fa-eye" id="eyePw"></i>
          </button>
        </div>
      </div>
      <div class="row-between">
        <label class="checkbox-label">
          <input type="checkbox" name="remember"/>
          <span class="checkmark"></span> Remember me
        </label>
      </div>
      <button type="submit" class="btn-primary">
        <span>LOGIN</span><i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
  </div>
</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
